version: '3.9'
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    env_file:
      - .env
    environment:
      API_PORT: 4000
      REDIS_URL: redis://redis:6379
      PORT: 4000
    depends_on:
      - redis
    ports:
      - '4000:4000'

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.worker
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: infra/Dockerfile.web
    environment:
      API_INTERNAL_URL: http://api:4000
    depends_on:
      - api
    ports:
      - '3000:3000'
