<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pro PDF Mate</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white">
  <main class="mx-auto min-h-screen max-w-6xl px-6 py-16">
    <p class="text-sm uppercase tracking-[0.3em] text-sky-400">Pro PDF Mate</p>
    <h1 class="mt-3 text-4xl font-bold">All PDF tools in one workspace.</h1>
    <p class="mt-4 max-w-2xl text-slate-300">Node + queue-powered PDF tools monorepo.</p>
    <section class="mt-10 grid gap-5 sm:grid-cols-2">
      <a href="/merge-pdf" class="block rounded-2xl border border-slate-800 bg-slate-900/60 p-6 hover:border-sky-400">
        <h3 class="text-lg font-semibold">Merge PDF</h3>
        <p class="mt-2 text-sm text-slate-300">Combine multiple PDFs into one in order.</p>
      </a>
      <div class="rounded-2xl border border-slate-800 bg-slate-900/60 p-6 opacity-60"><h3>Split PDF</h3></div>
      <div class="rounded-2xl border border-slate-800 bg-slate-900/60 p-6 opacity-60"><h3>Compress PDF</h3></div>
      <div class="rounded-2xl border border-slate-800 bg-slate-900/60 p-6 opacity-60"><h3>PDF to Word</h3></div>
    </section>
  </main>
</body>
</html>
